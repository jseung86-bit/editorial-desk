<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>사설 · The Editorial Desk</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..900;1,8..60,400..900&family=Noto+Serif+KR:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #f5efe2; }
  body { font-family: 'Source Serif 4', 'Noto Serif KR', Georgia, serif; color: #1a1713; }
  * { box-sizing: border-box; }
  button { font: inherit; }

  /* Tab bar */
  .option-bar {
    position: sticky; top: 0; z-index: 50;
    background: #1a1713; color: #faf6ec;
    display: flex; align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid #2e2a22;
    height: 52px;
  }
  .option-bar__brand {
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 18px;
    letter-spacing: -0.02em;
    margin-right: 28px;
  }
  .option-bar__brand em { font-style: italic; font-weight: 400; opacity: 0.6; font-size: 14px; }
  .option-bar__tabs { display: flex; gap: 0; flex: 1; }
  .option-tab {
    background: transparent; border: none;
    color: #a89b82;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
    padding: 16px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .option-tab:hover { color: #faf6ec; }
  .option-tab.active { color: #faf6ec; border-bottom-color: #faf6ec; }
  .option-tab__num { opacity: 0.5; margin-right: 6px; }

  .option-bar__meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: #a89b82;
    text-transform: uppercase; letter-spacing: 0.12em;
  }

  .option-view { min-height: calc(100vh - 52px); }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    width: 280px;
    background: #1a1713; color: #faf6ec;
    border: 1px solid #3a352b;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-panel h3 {
    margin: 0; padding: 12px 14px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
    border-bottom: 1px solid #3a352b;
    display: flex; justify-content: space-between; align-items: center;
  }
  .tweaks-row {
    padding: 10px 14px; border-bottom: 1px solid #2a261f;
  }
  .tweaks-row label {
    display: block; color: #a89b82; margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.1em; font-size: 9px;
  }
  .tweaks-row .choices { display: flex; gap: 4px; flex-wrap: wrap; }
  .tweaks-row .choices button {
    flex: 1; min-width: 0;
    padding: 6px 8px;
    background: transparent; color: #faf6ec;
    border: 1px solid #3a352b;
    font: inherit; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em;
    cursor: pointer;
    white-space: nowrap;
  }
  .tweaks-row .choices button.on {
    background: #faf6ec; color: #1a1713; border-color: #faf6ec;
  }

  /* Global theme knobs applied at root */
  @keyframes persp-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  [data-density="compact"] .option-view { font-size: 0.95em; }
  [data-theme="light"] { }
  [data-theme="sepia"] body { background: #f0e6cf; }

  /* Print styles */
  @media print { .option-bar, .tweaks-panel { display: none; } }

  /* ─────────── Mobile responsive ───────────
     inline style를 오버라이드해야 하므로 !important. 768px 이하에서:
     - 4열 grid → 1열 stack
     - 세로 구분선 → 가로 구분선으로 전환
     - 패딩·폰트 모바일 최적화
     - 탭바 가로 스크롤 허용
     - 번역 모달: 풀스크린 + split pane → single stack */
  @media (max-width: 768px) {
    .option-bar {
      overflow-x: auto; padding: 0 12px;
    }
    .option-bar__brand { margin-right: 12px; font-size: 15px; }
    .option-bar__brand em { display: none; }
    .option-tab { padding: 16px 10px; font-size: 10px; letter-spacing: 0.1em; }
    .option-tab__sub, .option-bar__meta { display: none; }

    /* Option C main/sub grids collapse to single column */
    .ed-row {
      grid-template-columns: 1fr !important;
    }
    .ed-cell {
      border-right: none !important;
      border-bottom: 1px solid #e5dfd2;
    }
    .ed-cell:last-child { border-bottom: none; }

    .ed-main-cell { padding: 20px 18px !important; gap: 12px !important; }
    .ed-sub-cell { padding: 16px 18px !important; }
    .ed-main-title { font-size: 20px !important; line-height: 1.25 !important; }
    .ed-sub-title { font-size: 16px !important; }
    .ed-summary-md { font-size: 14px !important; line-height: 1.5 !important; }
    .ed-summary-sm { font-size: 13px !important; }

    /* Tweaks panel becomes bottom sheet */
    .tweaks-panel { left: 12px; right: 12px; bottom: 12px; width: auto; }

    /* Translate reader — full-screen single-column */
    .ed-modal { padding: 0 !important; align-items: flex-start !important; }
    .ed-modal-inner {
      width: 100% !important;
      height: 100vh !important;
      border-radius: 0 !important;
    }
    .ed-modal-header {
      flex-wrap: wrap; padding: 12px 14px !important; gap: 8px !important;
    }
    .ed-modal-split {
      grid-template-columns: 1fr !important;
      grid-template-rows: auto auto !important;
    }
    .ed-modal-pane {
      padding: 20px 18px !important;
      border-right: none !important;
      border-bottom: 1px solid #e5dfd2;
    }
    .ed-modal-pane:last-child { border-bottom: none; }
    .ed-modal-pane h1 { font-size: 22px !important; }
    .ed-modal-pane p { font-size: 15px !important; line-height: 1.7 !important; }

    /* Option A broadsheet + Option B dashboard — give them decent stacking too */
    [data-screen-label="Option A"] > * { padding-left: 16px; padding-right: 16px; }
    [data-screen-label="Option B"] > * { padding-left: 12px; padding-right: 12px; }
  }
</style>
</head>
<body>

<div id="root"></div>

<div id="tweaks-panel" class="tweaks-panel">
  <h3>Tweaks <span id="tweaks-close" style="cursor:pointer; opacity:0.6;">✕</span></h3>
  <div class="tweaks-row">
    <label>Layout Option</label>
    <div class="choices" id="tw-layout">
      <button data-v="A">A · Broadsheet</button>
      <button data-v="B">B · Dashboard</button>
      <button data-v="C">C · Reading</button>
    </div>
  </div>
  <div class="tweaks-row">
    <label>Density</label>
    <div class="choices" id="tw-density">
      <button data-v="comfortable">Comfortable</button>
      <button data-v="compact">Compact</button>
    </div>
  </div>
  <div class="tweaks-row">
    <label>Translation UI</label>
    <div class="choices" id="tw-translate">
      <button data-v="split">Split</button>
      <button data-v="tabs">Tabs (soon)</button>
    </div>
  </div>
  <div class="tweaks-row" style="border-bottom:none; color:#7a7264;">
    Toggle Tweaks from the toolbar above to hide this panel.
  </div>
</div>

<script type="application/json" id="tweak-defaults">
/*EDITMODE-BEGIN*/{
  "layout": "C",
  "density": "comfortable",
  "translateUi": "split"
}/*EDITMODE-END*/
</script>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data (plain JS) -->
<!-- Data (plain JS) -->
<script src="data.js?v=13"></script>

<!-- Shared + Options (JSX) -->
<script type="text/babel" src="shared.jsx?v=13"></script>
<script type="text/babel" src="option-a-broadsheet.jsx?v=13"></script>
<script type="text/babel" src="option-b-dashboard.jsx?v=13"></script>
<script type="text/babel" src="option-c-reading-room.jsx?v=13"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// Read persisted defaults
const TWEAK_DEFAULTS = JSON.parse(
  document.getElementById('tweak-defaults').textContent
    .match(/EDITMODE-BEGIN\*\/([\s\S]*?)\/\*EDITMODE-END/)[1]
);

function App() {
  const [option, setOption] = useState(() => {
    return TWEAK_DEFAULTS.layout || 'C';
  });
  const [density, setDensity] = useState(TWEAK_DEFAULTS.density || 'comfortable');
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    document.body.dataset.density = density;
  }, [density]);

  // Edit-mode protocol
  useEffect(() => {
    const handler = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    try {
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    } catch (e) {}
    return () => window.removeEventListener('message', handler);
  }, []);

  // Wire up tweaks panel DOM controls (outside React tree)
  useEffect(() => {
    const panel = document.getElementById('tweaks-panel');
    panel.classList.toggle('open', tweaksOpen);
  }, [tweaksOpen]);

  useEffect(() => {
    const close = document.getElementById('tweaks-close');
    const onClose = () => setTweaksOpen(false);
    close.addEventListener('click', onClose);

    const bindGroup = (id, current, setter, persistKey) => {
      document.querySelectorAll(`#${id} button`).forEach(btn => {
        btn.classList.toggle('on', btn.dataset.v === current);
        btn.onclick = () => {
          const v = btn.dataset.v;
          setter(v);
          if (persistKey) {
            try {
              window.parent.postMessage({
                type: '__edit_mode_set_keys',
                edits: { [persistKey]: v }
              }, '*');
            } catch (e) {}
          }
        };
      });
    };
    bindGroup('tw-layout', option, setOption, 'layout');
    bindGroup('tw-density', density, setDensity, 'density');
    bindGroup('tw-translate', TWEAK_DEFAULTS.translateUi, () => {}, null);

    return () => close.removeEventListener('click', onClose);
  }, [option, density]);

  const Views = {
    A: window.OptionABroadsheet,
    B: window.OptionBDashboard,
    C: window.OptionCReadingRoom,
  };
  const View = Views[option] || Views.A;

  const tabs = [
    { id: 'A', num: '01', label: 'Broadsheet Grid', sub: '클래식 신문 1면' },
    { id: 'B', num: '02', label: 'Editorial Dashboard', sub: '터미널 · 다크' },
    { id: 'C', num: '03', label: 'Reading Room', sub: '리더 앱 · 매거진' },
  ];

  return (
    <>
      <div className="option-bar">
        <div className="option-bar__brand">사설 <em>Editorial Desk</em></div>
        <div className="option-bar__tabs">
          {tabs.map(t => (
            <button key={t.id}
              className={`option-tab ${option === t.id ? 'active' : ''}`}
              onClick={() => setOption(t.id)}
              data-screen-label={`0${t.id === 'A' ? 1 : t.id === 'B' ? 2 : 3} Option ${t.id}`}
            >
              <span className="option-tab__num">{t.num}</span>
              {t.label}
            </button>
          ))}
        </div>
        <div className="option-bar__meta">
          {tabs.find(t => t.id === option)?.sub}
        </div>
      </div>
      <div className="option-view" data-screen-label={`Option ${option}`}>
        <View />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
